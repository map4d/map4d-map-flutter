name: map4d_map_dtqg
version: 0.1.0
description: A Flutter plugin for integrating Map4D DTQG in iOS and Android applications.
homepage: https://map4d.vn

environment:
  sdk: ">=2.14.0 <4.0.0"
  flutter: ">=1.22.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.3.0
  collection: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: vn.map4d.map.map4d_map
        pluginClass: FMFMapViewPlugin
      ios:
        pluginClass: Map4dMapPlugin
